name: Build & Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build

      # Assemble the standalone bundle in one place for easy transfer
      - name: Prepare release bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync standalone bundle to EC2
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            .next/standalone/ \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/gh-aws/"

      - name: Restart application service
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo systemctl restart gh-aws && sudo systemctl status gh-aws --no-pager"
